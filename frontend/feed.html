<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<title>TriconStories</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#111111;
    --bg2:#1a1a1a;
    --bg3:#222222;
    --border:#2e2e2e;
    --brown:#ab001a;
    --brown2:#7a0012;
    --brownlt:#cc001f;
    --rose:#3a1a1a;
    --rosebg:#2a1111;
    --text:#f0f0f0;
    --sub:#bbbbbb;
    --muted:#666666;
    --green:#4caf50;
    --red:#ab001a;
    --yellow:#f0a500;
    --shadow-sm:0 1px 4px rgba(0,0,0,.4);
    --shadow:0 4px 18px rgba(0,0,0,.5);
    --shadow-lg:0 10px 44px rgba(0,0,0,.6);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

  nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 52px;height:64px;background:rgba(17,17,17,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);}
  .logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:var(--brown2);text-decoration:none;letter-spacing:-.01em;}
  .logo span{color:var(--brownlt);font-style:italic;}
  .nav-right{display:flex;gap:10px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none;padding:8px 20px;border:none;}
  .btn-o{background:transparent;border:1.5px solid var(--brown);color:var(--brown);}
  .btn-o:hover{background:rgba(124,74,45,.06);}
  .btn-p{background:var(--brown);color:white;}
  .btn-p:hover{background:var(--brown2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(92,53,32,.28);}

  .hero{text-align:center;padding:60px 24px 44px;}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--rosebg);border:1px solid var(--rose);border-radius:100px;padding:5px 16px;font-size:11px;font-weight:600;color:var(--brown);letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px;}
  .pulse{width:6px;height:6px;background:var(--brownlt);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  h1{font-family:'Playfair Display',serif;font-size:clamp(30px,5vw,52px);font-weight:800;line-height:1.12;letter-spacing:-.02em;margin-bottom:14px;color:var(--text);}
  h1 em{font-style:italic;color:var(--brown);}
  .hero-sub{color:var(--sub);font-size:15px;font-weight:300;max-width:380px;margin:0 auto;line-height:1.75;}

  .section-sep{display:flex;align-items:center;gap:14px;max-width:1160px;margin:0 auto 28px;padding:0 24px;}
  .section-sep hr{flex:1;border:none;border-top:1px solid var(--border);}
  .section-sep span{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;}

  .wrap{max-width:1160px;margin:0 auto;padding:0 24px 80px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:560px){.grid{grid-template-columns:1fr;}}

  .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:visible;cursor:pointer;transition:all .25s;animation:fadeup .38s ease both;display:flex;flex-direction:column;box-shadow:var(--shadow-sm);}
  .card:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px);border-color:var(--rose);}
  @keyframes fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  .cpic{height:196px;position:relative;overflow:hidden;background:linear-gradient(145deg,var(--rosebg),var(--bg3));display:flex;align-items:center;justify-content:center;}
  .cpic img{width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform .4s ease;}
  .card:hover .cpic img{transform:scale(1.04);}
  .cpic-fb{width:78px;height:78px;border-radius:50%;background:linear-gradient(135deg,var(--rosebg),var(--rose));border:2.5px solid rgba(124,74,45,.18);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--brown);}

  .cc{padding:16px 18px 18px;flex:1;display:flex;flex-direction:column;}
  .ct{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1.35;margin-bottom:12px;color:var(--text);}
  .cmeta{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .sm-av{width:28px;height:28px;border-radius:50%;overflow:hidden;border:1.5px solid var(--rose);flex-shrink:0;}
  .sm-av img{width:100%;height:100%;object-fit:cover;object-position:top;}
  .sm-av-fb{width:28px;height:28px;border-radius:50%;background:var(--rosebg);border:1.5px solid var(--rose);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:9px;font-weight:700;color:var(--brown);flex-shrink:0;}
  .cname{font-size:12px;font-weight:600;color:var(--text);}
  .crole{font-size:11px;color:var(--muted);margin-top:1px;}
  .cpreview{font-size:13px;color:#f0f0f0;line-height:1.7;font-weight:300;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1;margin-bottom:14px;}
  .cread{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--brown);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:gap .2s;margin-top:auto;background:none;border:none;padding:0;font-family:'DM Sans',sans-serif;}
  .cread:hover{gap:9px;}

  .pag{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:44px;flex-wrap:wrap;}
  .pb{min-width:36px;height:36px;padding:0 12px;border-radius:6px;border:1.5px solid var(--border);background:#1a1a1a;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;}
  .pb:hover:not(:disabled){border-color:var(--brown);color:var(--brown);}
  .pb.on{background:var(--brown);border-color:var(--brown);color:white;}
  .pb:disabled{opacity:.3;cursor:not-allowed;}

  .ov{position:fixed;inset:0;z-index:200;background:rgba(44,26,16,.46);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px;}
  .ov.open{display:flex;}
  .mod{background:#1a1a1a;border:1px solid var(--border);border-radius:14px;max-width:960px;width:100%;max-height:92vh;overflow-y:auto;position:relative;animation:modIn .26s ease;box-shadow:var(--shadow-lg);}
  .mod::-webkit-scrollbar{width:4px;}
  .mod::-webkit-scrollbar-thumb{background:var(--rose);border-radius:4px;}
  .mod-top{height:3px;background:linear-gradient(90deg,var(--brown2),var(--brownlt));border-radius:14px 14px 0 0;}
  @keyframes modIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .mhdr{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 26px 0;gap:16px;}
  .mttl{font-family:'Playfair Display',serif;font-size:clamp(16px,2.5vw,21px);font-weight:700;line-height:1.28;color:var(--text);word-break:break-word;}
  .xb{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .18s;flex-shrink:0;}
  .xb:hover{color:var(--red);border-color:rgba(184,50,37,.25);}
  .mmeta{display:flex;align-items:center;gap:12px;padding:14px 26px 0;}
  .mav{width:46px;height:46px;border-radius:50%;overflow:hidden;border:2px solid var(--rose);flex-shrink:0;}
  .mav img{width:100%;height:100%;object-fit:cover;object-position:top;}
  .mav-fb{width:46px;height:46px;border-radius:50%;background:var(--rosebg);border:2px solid var(--rose);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--brown);flex-shrink:0;}
  .mdiv{margin:16px 26px;height:1px;background:var(--border);}
  .mbody{padding:0 26px 4px;font-size:14px;font-weight:300;color:var(--sub);line-height:1.9;white-space:pre-wrap;}
  .mextra{margin:14px 26px 26px;padding:11px 14px;background:rgba(61,112,53,.07);border:1px solid rgba(61,112,53,.2);border-radius:8px;font-size:13px;color:var(--green);display:none;align-items:center;gap:8px;}
  .msg{text-align:center;padding:60px 24px;color:var(--muted);font-size:14px;grid-column:1/-1;}
  .msg .i{font-size:30px;margin-bottom:10px;}
  .share-wrap{position:relative;display:inline-block;}
  .share-btn{width:32px;height:32px;border-radius:6px;border:1.5px solid var(--border);background:#1a1a1a;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .18s;flex-shrink:0;}
  .share-btn:hover{border-color:var(--brown);color:var(--brown);}
  .share-drop{position:absolute;top:38px;right:0;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 18px rgba(90,45,15,.12);min-width:160px;z-index:9999;display:none;overflow:hidden;}
  .share-drop.up{top:auto;bottom:38px;}
  .share-drop.open{display:block;}
  .share-opt{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;color:var(--sub);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif;}
  .share-opt:hover{background:var(--rosebg);color:var(--brown);}

  /* Reactions */
  .react-wrap{position:relative;display:inline-block;}
  .react-btn{height:32px;padding:0 10px;border-radius:6px;border:1.5px solid var(--border);background:#1a1a1a;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:13px;transition:all .18s;flex-shrink:0;}
  .react-btn:hover{border-color:var(--brown);color:var(--brown);}
  .react-btn.reacted{border-color:var(--brown);background:var(--rosebg);color:var(--brown);}
  .react-picker{position:absolute;bottom:38px;right:0;background:#1a1a1a;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 18px rgba(90,45,15,.15);padding:8px;display:none;z-index:9999;width:260px;flex-wrap:wrap;}
  .react-picker.open{display:flex;gap:4px;}
  .react-emoji{font-size:20px;cursor:pointer;padding:4px 6px;border-radius:8px;transition:background .15s;border:none;background:none;line-height:1;}
  .react-emoji:hover{background:var(--rosebg);transform:scale(1.2);}
  .react-emoji.mine{background:var(--rosebg);outline:2px solid var(--brown);}
  .reactions-strip{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:6px;min-height:22px;}
  .r-badge{display:inline-flex;align-items:center;gap:3px;background:var(--rosebg);border:1px solid var(--rose);border-radius:100px;padding:2px 8px;font-size:12px;cursor:pointer;transition:all .15s;}
  .r-badge:hover{border-color:var(--brown);}
  .r-badge.mine{border-color:var(--brown);background:rgba(124,74,45,.1);}

  /* Reactions people list popup */
  .react-list-ov{position:fixed;inset:0;z-index:300;background:rgba(44,26,16,.3);display:none;align-items:center;justify-content:center;}
  .react-list-ov.open{display:flex;}
  .react-list-box{background:#1a1a1a;border-radius:12px;padding:20px;min-width:260px;max-width:360px;max-height:400px;overflow-y:auto;box-shadow:var(--shadow-lg);}
  .react-list-title{font-weight:600;font-size:14px;margin-bottom:12px;color:var(--text);}
  .react-person{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px;color:var(--sub);border-bottom:1px solid var(--border);}
  .react-person:last-child{border-bottom:none;}

  /* COMMENTS */
  .comments-section{border-top:1px solid var(--border);margin-top:8px;}
  .comments-tab{display:flex;align-items:center;gap:8px;padding:12px 26px;cursor:pointer;font-size:13px;font-weight:600;color:var(--sub);transition:color .18s;user-select:none;}
  .comments-tab:hover{color:var(--brown);}
  .comments-tab svg{transition:transform .22s;}
  .comments-tab.open svg{transform:rotate(180deg);}
  .comments-body{display:none;padding:0 26px 20px;}
  .comments-body.open{display:block;}
  .comment-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(226,207,194,.4);}
  .comment-item:last-child{border-bottom:none;}
  .comment-av{width:32px;height:32px;border-radius:50%;overflow:hidden;border:1.5px solid var(--rose);flex-shrink:0;}
  .comment-av img{width:100%;height:100%;object-fit:cover;object-position:top;}
  .comment-av-fb{width:32px;height:32px;border-radius:50%;background:var(--rosebg);border:1.5px solid var(--rose);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:10px;font-weight:700;color:var(--brown);flex-shrink:0;}
  .comment-bubble{flex:1;min-width:0;}
  .comment-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;}
  .comment-text{font-size:13px;color:var(--sub);line-height:1.6;word-break:break-word;}
  .comment-text p{margin:0;}
  .comment-meta{display:flex;align-items:center;gap:10px;margin-top:4px;}
  .comment-time{font-size:11px;color:var(--muted);}
  .comment-del{font-size:11px;color:var(--red);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;opacity:.7;transition:opacity .15s;}
  .comment-del:hover{opacity:1;}
  .comment-editor-wrap{margin-top:14px;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;background:#1a1a1a;transition:border-color .18s;}
  .comment-editor-wrap:focus-within{border-color:var(--brown);box-shadow:0 0 0 3px rgba(124,74,45,.09);}
  .comment-toolbar{display:flex;align-items:center;gap:2px;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--bg);}
  .ctb-btn{width:28px;height:28px;border-radius:5px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--sub);transition:all .15s;font-family:'DM Sans',sans-serif;font-weight:600;}
  .ctb-btn:hover{background:var(--rosebg);color:var(--brown);}
  .ctb-btn.active{background:var(--rosebg);color:var(--brown);}
  .ctb-sep{width:1px;height:18px;background:var(--border);margin:0 4px;}
  .comment-input{min-height:70px;max-height:160px;overflow-y:auto;padding:10px 12px;font-size:13px;color:var(--text);line-height:1.6;outline:none;font-family:'DM Sans',sans-serif;}
  .comment-input:empty:before{content:attr(data-placeholder);color:var(--muted);pointer-events:none;}
  .comment-input b,.comment-input strong{font-weight:700;}
  .comment-input i,.comment-input em{font-style:italic;}
  .comment-input u{text-decoration:underline;}
  .comment-actions{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg);border-top:1px solid var(--border);}
  .emoji-pick-wrap{position:relative;}
  .emoji-grid{position:fixed;background:white;border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 18px rgba(90,45,15,.15);padding:8px;display:none;z-index:99999;width:260px;flex-wrap:wrap;gap:4px;}
  .emoji-grid.open{display:flex;}
  .emoji-item{font-size:20px;cursor:pointer;padding:4px 6px;border-radius:8px;border:none;background:none;line-height:1;transition:background .15s;}
  .emoji-item:hover{background:var(--rosebg);transform:scale(1.2);}
  .submit-comment-btn{height:32px;padding:0 16px;border-radius:6px;background:var(--brown);color:white;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;}
  .submit-comment-btn:hover:not(:disabled){background:var(--brown2);}
  .submit-comment-btn:disabled{opacity:.5;cursor:not-allowed;}
  .no-comments{text-align:center;padding:20px;color:var(--muted);font-size:13px;}
  .comment-count-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}

  /* SORT BUTTONS */
  .sort-btn{height:32px;padding:0 12px;border-radius:6px;border:1.5px solid var(--border);background:#1a1a1a;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap;}
  .sort-btn:hover{border-color:var(--brown);color:var(--brown);}
  .sort-btn.active{background:var(--brown);border-color:var(--brown);color:white;}

  /* STORY BODY LEGIBILITY */
  .mbody{padding:0 26px 4px;font-size:15px;font-weight:400;color:#f0f0f0;line-height:2;white-space:pre-wrap;letter-spacing:.01em;}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/feed" style="display:flex;align-items:center;gap:8px;"><img src="/static/tricon-logo.png" alt="Tricon" style="width:32px;height:32px;border-radius:6px;object-fit:cover;">Tricon<span>Stories</span></a>
  <div class="nav-right">
    <a class="btn btn-o" id="nav-register" href="/register">Register</a>
    <a class="btn btn-p" id="nav-login" href="/login">Login</a>
  </div>
</nav>

<div id="banner-slider" style="display:none;position:relative;width:100%;overflow:hidden;background:#111111;">
  <div id="banner-track" style="display:flex;transition:transform .4s ease;"></div>
  <button onclick="bannerPrev()" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.45);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;">‹</button>
  <button onclick="bannerNext()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.45);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;">›</button>
  <div id="banner-dots" style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:5;"></div>
</div>

<div class="hero">
  <div class="eyebrow"><span class="pulse"></span>Live Stories</div>
  <h1>Our <em>Success</em><br>Stories</h1>
  <p class="hero-sub">Celebrating the achievements and milestones of the Tricon Infotech team.</p>
</div>

<div class="section-sep"><hr/><span>Latest Stories</span><hr/></div>

<div style="max-width:1160px;margin:0 auto 24px;padding:0 24px;">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <!-- Search -->
    <div style="position:relative;flex:1;min-width:200px;max-width:400px;">
      <input type="text" id="search-input" placeholder="Search by employee name..." oninput="onSearch()" style="width:100%;border:1.5px solid var(--border);border-radius:8px;background:white;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 38px 10px 14px;outline:none;transition:border-color .18s,box-shadow .18s;" onfocus="this.style.borderColor='var(--brown)';this.style.boxShadow='0 0 0 3px rgba(124,74,45,.09)'" onblur="this.style.borderColor='var(--border)';this.style.boxShadow='none'"/>
      <svg style="position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <!-- Sort -->
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
      <span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;">Sort:</span>
      <button class="sort-btn active" id="sort-recent" onclick="setSort('recent')">🕐 Recent</button>
      <button class="sort-btn" id="sort-oldest" onclick="setSort('oldest')">🕐 Oldest</button>
      <button class="sort-btn" id="sort-views" onclick="setSort('views')">👁 Most Views</button>
      <button class="sort-btn" id="sort-views-asc" onclick="setSort('views-asc')">👁 Least Views</button>
      <button class="sort-btn" id="sort-comments" onclick="setSort('comments')">💬 Most Comments</button>
      <button class="sort-btn" id="sort-comments-asc" onclick="setSort('comments-asc')">💬 Least Comments</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="grid" id="grid"><div class="msg"><div class="i">⏳</div>Loading stories...</div></div>
  <div class="pag" id="pag"></div>
</div>

<div class="ov" id="ov" onclick="bgX(event)">
  <div class="mod">
    <div class="mod-top"></div>
    <div class="mhdr"><div class="mttl" id="m-title"></div><div style="display:flex;gap:8px;align-items:center;flex-shrink:0;"><div class="share-wrap"><button class="share-btn" id="m-share-id" onclick="toggleShare(event,'modal')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button><div class="share-drop" id="share-modal"><button class="share-opt" onclick="copyLink(event,'modal')">🔗 Copy Link</button><button class="share-opt" onclick="shareLinkedIn(event,'modal','')">💼 Share on LinkedIn</button></div></div><button class="xb" onclick="closeM()">✕</button></div></div>
    <div class="mmeta" id="m-meta"></div>
    <div class="mdiv"></div>
    <div id="m-story-pic-container" style="display:none;margin:0 26px 16px;">
      <img id="m-story-pic" src="" alt="Story" style="width:100%;max-height:400px;object-fit:contain;border-radius:8px;background:#f5e6da;">
    </div>
    <div class="mbody" id="m-body"></div>
    <div style="padding:0 26px 10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span id="m-view-count">0 views</span>
      </div>
      <div class="react-wrap">
        <button class="react-btn" id="m-react-btn" onclick="togglePicker(event,'rp-modal')">😊 React</button>
        <div class="react-picker" id="rp-modal"></div>
      </div>
    </div>
    <div class="reactions-strip" id="rs-modal" style="padding:0 26px 10px;"></div>
    <div class="mextra" id="m-extra"><span>🏆</span><span id="m-xt"></span></div>

    <!-- COMMENTS SECTION -->
    <div class="comments-section" id="comments-section">
      <div style="display:flex;align-items:center;gap:8px;padding:14px 26px 10px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span id="comments-tab-label" style="font-size:13px;font-weight:600;color:var(--sub);">Comments</span>
      </div>
      <div style="padding:0 26px 24px;">
        <div id="comments-list"></div>
        <div id="comment-editor-area"></div>
      </div>
    </div>
  </div>
</div>

<div class="react-list-ov" id="react-list-ov" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="react-list-box">
    <div class="react-list-title" id="react-list-title">Reactions</div>
    <div id="react-list-people"></div>
  </div>
</div>

<script>
const API="";
const EMOJIS=["👍","❤️","😂","😮","😢","🙏","🎉","🏆","🔥","💪","🤝","🫂","👏","⭐","💯"];
const isLoggedIn=()=>{try{const t=localStorage.getItem('token');if(!t)return false;const p=JSON.parse(atob(t.split('.')[1]));return p.exp*1000>Date.now();}catch{return false;}};
const authHeader=()=>{const t=localStorage.getItem('token');return t?{Authorization:`Bearer ${t}`}:{};};

function renderReactionStrip(reactions,myReaction,storyId){
  if(!reactions||!reactions.length)return '';
  const sorted=[...reactions].sort((a,b)=>b.count-a.count);
  const show=sorted.slice(0,2);
  const extra=sorted.length>2?sorted.length-2:0;
  let html=show.map(r=>`<span class="r-badge ${myReaction===r.emoji?'mine':''}" onclick="showReactList(event,${JSON.stringify(reactions).replace(/"/g,'&quot;')},'${storyId}')">${r.emoji} ${r.count}</span>`).join('');
  if(extra)html+=`<span class="r-badge" onclick="showReactList(event,${JSON.stringify(reactions).replace(/"/g,'&quot;')},'${storyId}')">+${extra}</span>`;
  return html;
}

function showReactList(e,reactions,storyId){
  e.stopPropagation();
  const ov=document.getElementById('react-list-ov');
  const people=document.getElementById('react-list-people');
  document.getElementById('react-list-title').textContent='Reactions';
  people.innerHTML=reactions.flatMap(r=>r.names.map(n=>`<div class="react-person"><span style="font-size:18px">${r.emoji}</span><span>${n}</span></div>`)).join('');
  ov.classList.add('open');
}

function togglePicker(e,id){
  e.stopPropagation();
  if(!isLoggedIn()){alert('Please login to react!');return;}
  document.querySelectorAll('.react-picker').forEach(p=>{if(p.id!==id)p.classList.remove('open');});
  document.getElementById(id).classList.toggle('open');
}

async function doReact(e,storyId,emoji,context){
  e.stopPropagation();
  if(!isLoggedIn()){alert('Please login to react!');return;}
  const sid=context==='modal'?document.getElementById('m-share-id').dataset.id:storyId;
  try{
    const r=await fetch(`${API}/stories/${sid}/react`,{method:'POST',headers:{'Content-Type':'application/json',...authHeader()},body:JSON.stringify({emoji})});
    if(!r.ok)throw 0;
    const s=await r.json();
    // update card reactions strip
    const rs=document.getElementById(`rs-${sid}`);
    if(rs)rs.innerHTML=renderReactionStrip(s.reactions||[],s.my_reaction,sid);
    // update card react button
    const cardBtn=document.querySelector(`#rp-${sid}`)?.previousElementSibling;
    if(cardBtn){cardBtn.textContent=s.my_reaction?`${s.my_reaction} React`:'😊 React';cardBtn.className=`react-btn${s.my_reaction?' reacted':''}`;}
    // update card picker
    document.querySelectorAll(`#rp-${sid} .react-emoji`).forEach(b=>{b.className='react-emoji'+(s.my_reaction===b.textContent?' mine':'');});
    // update modal if open
    if(context==='modal'||document.getElementById('m-share-id').dataset.id==sid){
      const mrs=document.getElementById('rs-modal');
      if(mrs)mrs.innerHTML=renderReactionStrip(s.reactions||[],s.my_reaction,'modal');
      const mBtn=document.getElementById('m-react-btn');
      if(mBtn){mBtn.textContent=s.my_reaction?`${s.my_reaction} React`:'😊 React';mBtn.className=`react-btn${s.my_reaction?' reacted':''}`;}
      document.querySelectorAll('#rp-modal .react-emoji').forEach(b=>{b.className='react-emoji'+(s.my_reaction===b.textContent?' mine':'');});
    }
  }catch{alert('Failed to react. Try again.');}
  document.querySelectorAll('.react-picker').forEach(p=>p.classList.remove('open'));
}

const _t=localStorage.getItem('token');
if(_t){try{const _p=JSON.parse(atob(_t.split('.')[1]));if(_p.exp*1000>Date.now()){document.getElementById('nav-register').textContent='Dashboard';document.getElementById('nav-register').href='/dashboard';document.getElementById('nav-login').style.display='none';}}catch(e){}}
const PER=12;let pg=1,tot=1,searchTerm='',sortBy='recent';
let searchTimer=null;

function onSearch(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    searchTerm=document.getElementById('search-input').value.trim();
    pg=1;load(1);
  },350);
}

function setSort(s){
  sortBy=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`sort-${s}`).classList.add('active');
  pg=1;load(1);
}
const ini=n=>(n||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2);
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
const validPic = (u) => {
  if(!u) return false;
  u = String(u);
  return !u.includes('male.jpg') && (u.startsWith('http') || u.startsWith('/'));
};
function cardPicHTML(pic,inits){
  if(validPic(pic))return `<img src="${pic}" alt="${inits}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="cpic-fb" style="display:none">${inits}</div>`;
  return `<div class="cpic-fb">${inits}</div>`;
}
function smAvHTML(pic,inits){
  if(validPic(pic))return `<div class="sm-av"><img src="${pic}" onerror="this.parentElement.outerHTML='<div class=sm-av-fb>${inits}</div>'"></div>`;
  return `<div class="sm-av-fb">${inits}</div>`;
}
async function load(p){
  const g=document.getElementById('grid');
  g.innerHTML='<div class="msg"><div class="i">⏳</div>Loading...</div>';
  try{
    const q=searchTerm?`&search=${encodeURIComponent(searchTerm)}`:'';
    const r=await fetch(`${API}/stories/?page=${p}${q}&sort_by=${sortBy}`);if(!r.ok)throw 0;
    const d=await r.json();
    if(!d.stories.length){
      g.innerHTML=`<div class="msg"><div class="i">📭</div>${searchTerm?'No stories found for "'+searchTerm+'"':'No stories published yet.'}</div>`;
      document.getElementById('pag').innerHTML='';
      return;
    }
    tot=d.pages;
    pg=d.page;
    renderCards(d.stories);
    buildPag();
  }catch(e){console.error(e);g.innerHTML='<div class="msg"><div class="i">⚠️</div>Could not load stories. Is your backend running?</div>';}
}

function renderCards(stories){
  const g=document.getElementById('grid');
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  g.innerHTML=stories.map((s,i)=>{const inits=ini(s.name);return `
    <div class="card" style="animation-delay:${i*.06}s" onclick="openM(${s.story_id})">
      <div class="cpic">${cardPicHTML(s.story_picture||s.picture,inits)}</div>
      <div class="cc">
        <div class="ct">${esc(s.title)}</div>
        <div class="cmeta">${smAvHTML(s.picture,inits)}<div><div class="cname">${esc(s.name)}</div><div class="crole">${esc(s.designation)}</div><div class="crole">${fmtDate(s.created_at)}</div></div></div>
        <div class="cpreview">${(()=>{const d=document.createElement('div');d.innerHTML=s.content||'';return d.textContent||d.innerText||'';})()}</div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);margin-bottom:6px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          ${s.view_count||0}
        </div>
        <div class="reactions-strip" id="rs-${s.story_id}">${renderReactionStrip(s.reactions||[],s.my_reaction,s.story_id)}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;margin-top:4px;">
          <span class="comment-count-badge" id="cc-${s.story_id}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            ${s.comment_count||0}
          </span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
          <button class="cread" onclick="event.stopPropagation();openM(${s.story_id},true)">Read Story →</button>
          <button class="cread" style="color:var(--muted);" onclick="event.stopPropagation();openM(${s.story_id},true)">💬 Comment</button>
          <div style="display:flex;gap:6px;align-items:center;" onclick="event.stopPropagation()">
            <div class="react-wrap">
              <button class="react-btn ${s.my_reaction?'reacted':''}" onclick="togglePicker(event,'rp-${s.story_id}')">${s.my_reaction||'😊'} React</button>
              <div class="react-picker" id="rp-${s.story_id}">
                ${EMOJIS.map(e=>`<button class="react-emoji ${s.my_reaction===e?'mine':''}" onclick="doReact(event,${s.story_id},'${e}','card')">${e}</button>`).join('')}
              </div>
            </div>
            <div class="share-wrap">
              <button class="share-btn" onclick="toggleShare(event,${s.story_id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></button>
              <div class="share-drop up" id="share-${s.story_id}">
                <button class="share-opt" onclick="copyLink(event,${s.story_id})">🔗 Copy Link</button>
                <button class="share-opt" onclick="shareLinkedIn(event,${s.story_id},'${s.title.replace(/'/g,"\\'")}')" >💼 Share on LinkedIn</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;}).join('');
}
function buildPag(){
  if(tot<=1){document.getElementById('pag').innerHTML='';return;}
  let h=`<button class="pb" onclick="go(${pg-1})" ${pg===1?'disabled':''}>← Prev</button>`;
  for(let i=1;i<=tot;i++)h+=`<button class="pb ${i===pg?'on':''}" onclick="go(${i})">${i}</button>`;
  h+=`<button class="pb" onclick="go(${pg+1})" ${pg===tot?'disabled':''}>Next →</button>`;
  document.getElementById('pag').innerHTML=h;
}
function go(p){if(p<1||p>tot)return;pg=p;load(p);window.scrollTo({top:0,behavior:'smooth'});}
async function openM(id, scrollToComments=false){
  currentStoryId=id;
  commentsLoaded=false;
  document.getElementById('comments-list').innerHTML='';
  document.getElementById('comment-editor-area').innerHTML='';
  document.getElementById('comments-tab-label').textContent='Comments';
  try{
    const r=await fetch(`${API}/stories/${id}`);if(!r.ok)throw 0;
    const s=await r.json();const inits=ini(s.name);
    document.getElementById('m-title').textContent=s.title;
    document.getElementById('m-share-id').dataset.id=id;
    document.getElementById('m-share-id').dataset.title=s.title;
    const createdBy=s.created_by_name?`<div style="font-size:11px;color:var(--brownlt);margin-top:3px;font-weight:500;">✍️ Written by ${s.created_by_name}</div>`:'';
    document.getElementById('m-meta').innerHTML=validPic(s.picture)
      ?`<div class="mav"><img src="${s.picture}" onerror="this.parentElement.outerHTML='<div class=mav-fb>${inits}</div>'"></div><div style="min-width:0"><div style="font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:500px">${s.name}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${s.designation}</div>${createdBy}</div>`
      :`<div class="mav-fb">${inits}</div><div style="min-width:0"><div style="font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:500px">${s.name}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${s.designation}</div>${createdBy}</div>`;
    const picC=document.getElementById('m-story-pic-container');
    const picI=document.getElementById('m-story-pic');
    if(s.story_picture){picI.src=s.story_picture;picC.style.display='block';}
    else picC.style.display='none';
    document.getElementById('m-body').innerHTML=s.content;
    const ex=document.getElementById('m-extra');
    if(s.extra){document.getElementById('m-xt').textContent=s.extra;ex.style.display='flex';}else ex.style.display='none';
    document.getElementById('m-view-count').textContent=`${s.view_count||0} views`;
    // reactions in modal
    const mrs=document.getElementById('rs-modal');
    mrs.innerHTML=renderReactionStrip(s.reactions||[],s.my_reaction,'modal');
    const mBtn=document.getElementById('m-react-btn');
    mBtn.textContent=s.my_reaction?`${s.my_reaction} React`:'😊 React';
    mBtn.className=`react-btn${s.my_reaction?' reacted':''}`;
    document.querySelectorAll('#rp-modal .react-emoji').forEach(b=>{b.className='react-emoji'+(s.my_reaction===b.textContent?' mine':'');});
    document.getElementById('rp-modal').innerHTML=EMOJIS.map(e=>`<button class="react-emoji" onclick="doReact(event,'modal','${e}','modal')">${e}</button>`).join('');
    document.getElementById('ov').classList.add('open');
    document.body.style.overflow='hidden';
    // always load comments
    loadComments(id).then(()=>{
      if(scrollToComments){
        setTimeout(()=>{
          const sec=document.getElementById('comments-section');
          if(sec)sec.scrollIntoView({behavior:'smooth'});
          const inp=document.getElementById('comment-input');
          if(inp)inp.focus();
        },300);
      }
    });
  }catch(e){console.error(e);}
}
function closeM(){document.getElementById('ov').classList.remove('open');document.body.style.overflow='';}
function bgX(e){if(e.target===document.getElementById('ov'))closeM();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
function toggleShare(e,id){
  e.stopPropagation();
  e.preventDefault();
  document.querySelectorAll('.share-drop').forEach(d=>{if(d.id!==`share-${id}`)d.classList.remove('open');});
  const drop=document.getElementById(`share-${id}`);
  if(drop)drop.classList.toggle('open');
}
function copyLink(e,id){
  e.stopPropagation();
  const storyId=id==='modal'?document.getElementById('m-share-id').dataset.id:id;
  const url=`${window.location.origin}/feed?story=${storyId}`;
  document.querySelectorAll('.share-drop').forEach(d=>d.classList.remove('open'));
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(url).then(()=>alert('Link copied!'));
  } else {
    const ta=document.createElement('textarea');
    ta.value=url;
    ta.style.position='fixed';
    ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.focus();ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Link copied!');
  }
}
function shareLinkedIn(e,id,title){
  e.stopPropagation();
  const url=id==='modal'?window.location.href:`${window.location.origin}/feed?story=${id}`;
  const t=id==='modal'?document.getElementById('m-title').textContent:title;
  const li=`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}&title=${encodeURIComponent(t)}`;
  window.open(li,'_blank');
  document.querySelectorAll('.share-drop').forEach(d=>d.classList.remove('open'));
}
document.addEventListener('click',()=>{
  document.querySelectorAll('.share-drop').forEach(d=>d.classList.remove('open'));
  document.querySelectorAll('.react-picker').forEach(d=>d.classList.remove('open'));
  document.querySelectorAll('.emoji-grid').forEach(d=>d.classList.remove('open'));
});

// ==================== COMMENTS ====================
const COMMENT_EMOJIS=["😊","😂","👍","❤️","🔥","🎉","👏","🙏","💯","😮","😢","💪","🤝","⭐","😎","🤔","💡","✅","🚀","😅"];
let currentStoryId=null;
let commentsLoaded=false;
let currentUserId=null;
let currentUserRole=null;

try{
  const t=localStorage.getItem('token');
  if(t){const p=JSON.parse(atob(t.split('.')[1]));if(p.exp*1000>Date.now()){currentUserId=p.user_id;currentUserRole=p.role_id??0;}}
}catch(e){}

// comments always visible — no toggle needed

async function loadComments(storyId){
  const list=document.getElementById('comments-list');
  list.innerHTML='<div class="no-comments">Loading...</div>';
  try{
    const r=await fetch(`${API}/stories/${storyId}/comments`);
    const comments=await r.json();
    renderComments(comments,storyId);
    commentsLoaded=true;
    updateCommentTab(comments.length);
  }catch{
    list.innerHTML='<div class="no-comments">Failed to load comments.</div>';
  }
}

function updateCommentTab(count){
  const lbl=document.getElementById('comments-tab-label');
  if(lbl)lbl.textContent=`Comments (${count})`;
  // update card badge too
  const badge=document.getElementById(`cc-${currentStoryId}`);
  if(badge)badge.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${count}`;
}

function fmtAgo(dateStr){
  if(!dateStr)return '';
  const diff=Date.now()-new Date(dateStr).getTime();
  const m=Math.floor(diff/60000);
  if(m<1)return 'just now';
  if(m<60)return `${m}m ago`;
  const h=Math.floor(m/60);
  if(h<24)return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

function renderComments(comments,storyId){
  const list=document.getElementById('comments-list');
  const editorArea=document.getElementById('comment-editor-area');
  if(!comments.length){
    list.innerHTML='<div class="no-comments">No comments yet. Be the first!</div>';
  } else {
    list.innerHTML=comments.map(c=>{
      const inits=ini(c.name);
      const avHTML=validPic(c.picture)
        ?`<div class="comment-av"><img src="${c.picture}" onerror="this.parentElement.outerHTML='<div class=comment-av-fb>${inits}</div>'"></div>`
        :`<div class="comment-av-fb">${inits}</div>`;
      const canDel=(currentUserId&&(c.employee_id===currentUserId||currentUserRole>=1));
      return `<div class="comment-item" id="citem-${c.comment_id}">
        ${avHTML}
        <div class="comment-bubble">
          <div class="comment-name">${c.name||'Unknown'}</div>
          <div class="comment-text">${c.body}</div>
          <div class="comment-meta">
            <span class="comment-time">${fmtAgo(c.created_at)}</span>
            ${canDel?`<button class="comment-del" onclick="deleteComment(${storyId},${c.comment_id})">Delete</button>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
  }
  // render editor only if logged in
  if(isLoggedIn()){
    editorArea.innerHTML=`
      <div class="comment-editor-wrap" id="ceditor-wrap">
        <div class="comment-toolbar">
          <button class="ctb-btn" id="ctb-b" title="Bold" onclick="fmtCmd('bold')"><b>B</b></button>
          <button class="ctb-btn" id="ctb-i" title="Italic" onclick="fmtCmd('italic')"><i>I</i></button>
          <button class="ctb-btn" id="ctb-u" title="Underline" onclick="fmtCmd('underline')"><u>U</u></button>
          <div class="ctb-sep"></div>
          <div class="emoji-pick-wrap">
            <button class="ctb-btn" title="Emoji" onclick="toggleEmojiGrid(event)">😊</button>
            <div class="emoji-grid" id="comment-emoji-grid">
              ${COMMENT_EMOJIS.map(e=>`<button class="emoji-item" onmousedown="insertEmoji(event,'${e}')">${e}</button>`).join('')}
            </div>
          </div>
        </div>
        <div class="comment-input" id="comment-input" contenteditable="true" data-placeholder="Write a comment..." oninput="syncToolbarState()" onkeydown="commentKeydown(event)"></div>
        <div class="comment-actions">
          <span style="font-size:11px;color:var(--muted);" id="comment-char-count">0 / 2000</span>
          <button class="submit-comment-btn" id="submit-comment-btn" onclick="submitComment(${storyId})">Post</button>
        </div>
      </div>`;
    document.getElementById('comment-input').addEventListener('input',()=>{
      const len=document.getElementById('comment-input').innerText.length;
      document.getElementById('comment-char-count').textContent=`${len} / 2000`;
    });
  } else {
    editorArea.innerHTML=`<div class="no-comments" style="padding:14px 0;">
      <a href="/login" style="color:var(--brown);font-weight:600;text-decoration:none;">Login</a> to leave a comment.
    </div>`;
  }
}

function fmtCmd(cmd){
  document.getElementById('comment-input').focus();
  document.execCommand(cmd,false,null);
  syncToolbarState();
}

function syncToolbarState(){
  ['bold','italic','underline'].forEach(cmd=>{
    const id={'bold':'ctb-b','italic':'ctb-i','underline':'ctb-u'}[cmd];
    const el=document.getElementById(id);
    if(el)el.classList.toggle('active',document.queryCommandState(cmd));
  });
}

function toggleEmojiGrid(e){
  e.stopPropagation();
  const grid=document.getElementById('comment-emoji-grid');
  const rect=e.target.getBoundingClientRect();
  grid.style.left=rect.left+'px';
  grid.style.top=(rect.top-220)+'px';
  grid.classList.toggle('open');
}

function insertEmoji(e,emoji){
  e.preventDefault();
  const input=document.getElementById('comment-input');
  input.focus();
  document.execCommand('insertText',false,emoji);
  document.getElementById('comment-emoji-grid').classList.remove('open');
}

function commentKeydown(e){
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){
    e.preventDefault();
    const sid=currentStoryId;
    if(sid)submitComment(sid);
  }
}

async function submitComment(storyId){
  const input=document.getElementById('comment-input');
  const btn=document.getElementById('submit-comment-btn');
  const body=input.innerHTML.trim();
  const textLen=input.innerText.trim().length;
  if(!textLen)return;
  if(textLen>2000)return alert('Comment too long (max 2000 chars).');
  btn.disabled=true;btn.textContent='Posting...';
  try{
    const r=await fetch(`${API}/stories/${storyId}/comments`,{
      method:'POST',
      headers:{'Content-Type':'application/json',...authHeader()},
      body:JSON.stringify({body})
    });
    if(!r.ok)throw 0;
    input.innerHTML='';
    document.getElementById('comment-char-count').textContent='0 / 2000';
    await loadComments(storyId);
  }catch{alert('Failed to post comment.');}
  finally{btn.disabled=false;btn.textContent='Post';}
}

async function deleteComment(storyId,commentId){
  if(!confirm('Delete this comment?'))return;
  try{
    const r=await fetch(`${API}/stories/${storyId}/comments/${commentId}`,{
      method:'DELETE',
      headers:authHeader()
    });
    if(!r.ok)throw 0;
    document.getElementById(`citem-${commentId}`)?.remove();
    const remaining=document.querySelectorAll('.comment-item').length;
    updateCommentTab(remaining);
    if(!remaining)document.getElementById('comments-list').innerHTML='<div class="no-comments">No comments yet. Be the first!</div>';
  }catch{alert('Failed to delete comment.');}
}

// ==================== BANNER SLIDER ====================
let _bannerIdx=0;
let _bannerTotal=0;
let _bannerTimer=null;

async function loadBannerSlider(){
  try{
    const r=await fetch(`${API}/banners/`);
    const data=await r.json();
    if(!data.length)return;
    _bannerTotal=data.length;
    const slider=document.getElementById('banner-slider');
    const track=document.getElementById('banner-track');
    const dots=document.getElementById('banner-dots');
    track.innerHTML=data.map(b=>`<div id="bslide-wrap-${b.id||b.banner_id||Math.random()}" style="min-width:100%;flex-shrink:0;background:#111111;overflow:hidden;"><img src="${b.image_url}" alt="Banner" onload="fitBanner(this)" style="display:block;"></div>`).join('');
    dots.innerHTML=data.map((_,i)=>`<div id="bd-${i}" onclick="bannerGo(${i})" style="width:8px;height:8px;border-radius:50%;background:${i===0?'white':'rgba(255,255,255,.45)'};cursor:pointer;transition:background .2s;"></div>`).join('');
    slider.style.display='block';
    _bannerTimer=setInterval(bannerNext,4000);
  }catch{}
}

function bannerGo(i){
  _bannerIdx=i;
  document.getElementById('banner-track').style.transform=`translateX(-${i*100}%)`;
  document.querySelectorAll('[id^="bd-"]').forEach((d,j)=>d.style.background=j===i?'white':'rgba(255,255,255,.45)');
  clearInterval(_bannerTimer);_bannerTimer=setInterval(bannerNext,4000);
}
function bannerNext(){bannerGo((_bannerIdx+1)%_bannerTotal);}
function bannerPrev(){bannerGo((_bannerIdx-1+_bannerTotal)%_bannerTotal);}

function fitBanner(img){
  const wrap=img.parentElement;
  const vw=window.innerWidth;
  const nw=img.naturalWidth;
  const nh=img.naturalHeight;
  const ratio=nw/nh;

  // Detect format by aspect ratio
  // Portrait: 9:16, 3:4, 2:3 — ratio < 1
  // Square: 1:1 — ratio ~1
  // Landscape: 16:9, 3:2, 3:1 — ratio > 1.2

  wrap.style.overflow='hidden';
  wrap.style.background='#111111';
  wrap.style.display='flex';
  wrap.style.alignItems='center';
  wrap.style.justifyContent='center';
  img.style.display='block';

  if(ratio<0.85){
    // PORTRAIT (phone photo, 9:16, 3:4)
    // Fix height, let width be natural — don't stretch it wide
    const fixedH=Math.min(Math.max(Math.round(vw*0.55),280),480);
    wrap.style.height=fixedH+'px';
    img.style.height='100%';
    img.style.width='auto';
    img.style.maxWidth='100%';
    img.style.objectFit='contain';
  } else if(ratio<=1.2){
    // SQUARE (1:1, slight rect)
    const fixedH=Math.min(Math.max(Math.round(vw*0.4),260),440);
    wrap.style.height=fixedH+'px';
    img.style.height='100%';
    img.style.width='auto';
    img.style.maxWidth='100%';
    img.style.objectFit='contain';
  } else {
    // LANDSCAPE (16:9, 3:2, 3:1 — most banner-like)
    const fixedH=Math.min(Math.max(Math.round(vw/3),200),420);
    wrap.style.height=fixedH+'px';
    // Only cover if image is large enough — no upscale blur
    if(nw>=vw*0.7){
      img.style.width='100%';
      img.style.height='100%';
      img.style.objectFit='cover';
      img.style.objectPosition='center top';
    } else {
      img.style.width='auto';
      img.style.height='100%';
      img.style.maxWidth='100%';
      img.style.objectFit='scale-down';
    }
  }
}

loadBannerSlider();

load(1).then(()=>{
  const params=new URLSearchParams(window.location.search);
  const storyId=params.get('story');
  if(storyId)openM(parseInt(storyId));
});
