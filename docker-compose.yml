version: "3.8"

services:
  app:
    build: .
    container_name: triconstories-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: triconstories-db
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data: