<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<title>Register — TriconStories</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fdf4ee;--bg2:#ffffff;--bg3:#f5e6da;--border:#e2cfc2;
    --brown:#7c4a2d;--brown2:#5c3520;--brownlt:#a0674a;
    --rose:#e8c4b0;--rosebg:#f7e4d8;
    --text:#2c1a10;--sub:#6b4535;--muted:#b09080;
    --red:#b83225;--green:#3d7035;--yellow:#9a6c18;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
  nav{display:flex;align-items:center;padding:0 52px;height:64px;border-bottom:1px solid var(--border);background:rgba(253,244,238,.97);}
  .logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:var(--brown2);text-decoration:none;}
  .logo span{color:var(--brownlt);font-style:italic;}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 8px 36px rgba(90,45,15,.12);animation:up .35s ease;}
  @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .card-top{height:3px;background:linear-gradient(90deg,var(--brown2),var(--brownlt));}
  .card-body{padding:34px 36px 38px;}
  .card-icon{width:52px;height:52px;border-radius:12px;background:var(--rosebg);border:1px solid var(--rose);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:20px;}
  h1{font-family:'Playfair Display',serif;font-size:25px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-.01em;}
  .sub{font-size:13px;color:var(--muted);font-weight:300;margin-bottom:26px;}

  .f{margin-bottom:15px;}
  .f label{display:block;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
  .f input{width:100%;height:46px;border:1.5px solid var(--border);border-radius:8px;background:white;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:0 14px;outline:none;transition:border-color .18s,box-shadow .18s;}
  .f input:focus{border-color:var(--brown);box-shadow:0 0 0 3px rgba(124,74,45,.10);}
  .f input::placeholder{color:var(--muted);}
  .f input.valid{border-color:rgba(61,112,53,.55);}
  .f input.invalid{border-color:rgba(184,50,37,.5);}

  /* badge row */
  .irow{position:relative;}
  .irow input{padding-right:88px;}
  .ibadge{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;padding:3px 9px;border-radius:100px;pointer-events:none;letter-spacing:.04em;white-space:nowrap;transition:all .18s;}
  .ib-n{background:rgba(160,82,45,.08);color:var(--muted);border:1px solid rgba(160,82,45,.15);}
  .ib-ok{background:rgba(61,112,53,.1);color:var(--green);border:1px solid rgba(61,112,53,.25);}
  .ib-bad{background:rgba(184,50,37,.08);color:var(--red);border:1px solid rgba(184,50,37,.2);}
  .fhint{font-size:11px;margin-top:5px;line-height:1.4;color:var(--muted);}
  .fhint.ok{color:var(--green);}
  .fhint.bad{color:var(--red);}

  /* password */
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:44px;}
  .eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px;transition:color .18s;}
  .eye:hover{color:var(--brown);}
  .sbar{height:3px;border-radius:2px;background:rgba(160,82,45,.10);margin-top:6px;overflow:hidden;}
  .sfill{height:100%;border-radius:2px;transition:all .3s;width:0%;}
  .sw{width:33%;background:var(--red);}  .sm{width:66%;background:var(--yellow);}  .ss{width:100%;background:var(--green);}
  .slbl{font-size:11px;text-align:right;margin-top:3px;min-height:14px;}

  /* file */
  .file-wrap input[type="file"]{width:100%;background:white;border:1.5px solid var(--border);border-radius:8px;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 14px;outline:none;cursor:pointer;transition:border-color .18s;}
  .file-wrap input[type="file"]:hover{border-color:rgba(160,82,45,.3);}
  .file-wrap input[type="file"]::-webkit-file-upload-button{background:var(--brown);border:none;color:white;border-radius:6px;padding:5px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;margin-right:10px;}
  .preview{display:none;align-items:center;gap:10px;margin-top:9px;padding:9px 12px;background:rgba(124,74,45,.05);border:1px solid rgba(124,74,45,.16);border-radius:8px;}
  .preview.on{display:flex;}
  .prev-img{width:38px;height:38px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid var(--rose);}
  .prev-name{font-size:12px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px;}

  .al{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;line-height:1.5;}
  .al.on{display:block;}
  .ae{background:rgba(184,50,37,.06);border:1px solid rgba(184,50,37,.2);color:var(--red);}
  .as{background:rgba(61,112,53,.06);border:1px solid rgba(61,112,53,.2);color:var(--green);}

  .btn-full{width:100%;height:48px;border-radius:8px;background:var(--brown);color:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;margin-top:4px;}
  .btn-full:hover:not(:disabled){background:var(--brown2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(92,53,32,.28);}
  .btn-full:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .footer{text-align:center;font-size:13px;color:var(--muted);margin-top:20px;}
  .footer a{color:var(--brown);text-decoration:none;font-weight:500;}
  .footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<nav><a class="logo" href="/feed" style="display:flex;align-items:center;gap:8px;"><img src="/static/tricon-logo.png" alt="Tricon" style="width:32px;height:32px;border-radius:6px;object-fit:cover;">Tricon<span>Stories</span></a></nav>
<main>
  <div>
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="card-icon">✍️</div>
        <h1>Create Account</h1>
        <p class="sub">Join using your Tricon company credentials</p>

        <div class="al ae" id="err"></div>
        <div class="al as" id="ok"></div>

        <div class="f">
          <label>Full Name</label>
          <input type="text" id="nm" placeholder="e.g. Suresh Singh " />
          <div class="fhint" id="nm-hint">Must be <strong>Characters</strong> only</div>
        </div>

        <div class="f">
          <label>Tricon ID</label>
          <div class="irow">
            <input type="text" id="tid" placeholder="e.g. TRI001" oninput="chkTid(this.value)" autocomplete="off" />
            <span class="ibadge ib-n" id="tid-badge">TRI***</span>
          </div>
          <div class="fhint" id="tid-hint">Must start with <strong>TRI</strong> followed by digits</div>
        </div>

        <div class="f">
          <label>Company Email</label>
          <div class="irow">
            <input type="email" id="em" placeholder="you@triconinfotech.com" oninput="chkEmail(this.value)" />
            <span class="ibadge ib-n" id="em-badge">@triconinfotech.com</span>
          </div>
          <div class="fhint" id="em-hint">Only <strong>@triconinfotech.com</strong> addresses accepted</div>
        </div>

        <div class="f">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="pw" placeholder="Min 8 chars, 1 uppercase, 1 number" oninput="chkStr(this.value)" />
            <button class="eye" type="button" onclick="tog()">👁</button>
          </div>
          <div class="sbar"><div class="sfill" id="sf"></div></div>
          <div class="slbl" id="sl"></div>
        </div>

        <div class="f">
          <label>Profile Picture</label>
          <div class="file-wrap">
            <input type="file" id="pic" accept=".jpg,.jpeg,.png,.webp" onchange="prevPic(this)" />
            <div class="preview" id="prev">
              <img class="prev-img" id="prev-img" src="" alt="" />
              <span class="prev-name" id="prev-name"></span>
            </div>
          </div>
        </div>

        <button class="btn-full" id="rbtn" onclick="doReg()">Create Account</button>
      </div>
    </div>
    <div class="footer">Already have an account? <a href="/login">Login</a> &nbsp;·&nbsp; <a href="/feed">← Back to stories</a></div>
  </div>
</main>

<script>
const API="";
function tog(){const i=document.getElementById('pw');i.type=i.type==='password'?'text':'password';}

function chkTid(v){
  const inp=document.getElementById('tid'),b=document.getElementById('tid-badge'),h=document.getElementById('tid-hint');
  if(!v){inp.className='';b.className='ibadge ib-n';b.textContent='TRI***';h.className='fhint';h.innerHTML='Must start with <strong>TRI</strong> followed by digits';return;}
  const ok=/^TRI\d+$/i.test(v);
  inp.className=ok?'valid':'invalid';b.className='ibadge '+(ok?'ib-ok':'ib-bad');b.textContent=ok?'✓ Valid':'✗ Invalid';
  h.className='fhint '+(ok?'ok':'bad');h.textContent=ok?'Looks good!':'Must be TRI followed by digits e.g. TRI001';
}
function chkEmail(v){
  const inp=document.getElementById('em'),b=document.getElementById('em-badge'),h=document.getElementById('em-hint');
  if(!v){inp.className='';b.className='ibadge ib-n';b.textContent='@triconinfotech.com';h.className='fhint';h.innerHTML='Only <strong>@triconinfotech.com</strong> addresses accepted';return;}
  const ok=v.toLowerCase().endsWith('@triconinfotech.com');
  inp.className=ok?'valid':'invalid';b.className='ibadge '+(ok?'ib-ok':'ib-bad');b.textContent=ok?'✓ Valid':'✗ Invalid';
  h.className='fhint '+(ok?'ok':'bad');h.textContent=ok?'Company email accepted!':'Must be a @triconinfotech.com address';
}
function chkStr(v){
  const f=document.getElementById('sf'),l=document.getElementById('sl');f.className='sfill';
  if(!v){l.textContent='';return;}
  const u=/[A-Z]/.test(v),n=/[0-9]/.test(v),lg=v.length>=8;
  if(lg&&u&&n){f.classList.add('ss');l.textContent='Strong ✓';l.style.color='var(--green)';}
  else if(lg&&(u||n)){f.classList.add('sm');l.textContent='Medium';l.style.color='var(--yellow)';}
  else{f.classList.add('sw');l.textContent='Weak';l.style.color='var(--red)';}
}
function prevPic(input){
  const file=input.files[0];if(!file)return;
  document.getElementById('prev-img').src=URL.createObjectURL(file);
  document.getElementById('prev-name').textContent=file.name;
  document.getElementById('prev').classList.add('on');
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('on');document.getElementById('ok').classList.remove('on');e.scrollIntoView({behavior:'smooth',block:'nearest'});}
function showOk(m){const e=document.getElementById('ok');e.textContent=m;e.classList.add('on');document.getElementById('err').classList.remove('on');}

async function doReg(){
  document.getElementById('err').classList.remove('on');document.getElementById('ok').classList.remove('on');
  const name=document.getElementById('nm').value.trim();
  const tricon_id=document.getElementById('tid').value.trim().toUpperCase();
  const email=document.getElementById('em').value.trim();
  const password=document.getElementById('pw').value;
  const file=document.getElementById('pic').files[0];
  if(!name)return showErr('Please enter your full name.');
  if(!/^[a-zA-Z\s]+$/.test(name))return showErr('Name must contain letters only.');
  if(name.length<2)return showErr('Name is too short.');
  if(name.length>100)return showErr('Name must be under 100 characters.');
  if(!tricon_id)return showErr('Please enter your Tricon ID.');
  if(!/^TRI\d+$/i.test(tricon_id))return showErr('Tricon ID must start with TRI followed by digits, e.g. TRI001.');
  if(tricon_id.length>7)return showErr('Tricon ID is too long, e.g. TRI001.');
  if(!email)return showErr('Please enter your company email.');
  if(!email.toLowerCase().endsWith('@triconinfotech.com'))return showErr('Email must be a @triconinfotech.com address.');
  if(!password||password.length<8)return showErr('Password must be at least 8 characters.');
  if(!/[A-Z]/.test(password))return showErr('Password must contain at least one uppercase letter.');
  if(!/[0-9]/.test(password))return showErr('Password must contain at least one number.');
  if(!file)return showErr('Please upload a profile photo.');
  if(file.size>5*1024*1024)return showErr('Profile picture must be under 5MB.');
  const btn=document.getElementById('rbtn');btn.textContent='Uploading photo...';btn.disabled=true;
  try{
    const fd=new FormData();fd.append('file',file);
    const ur=await fetch(`${API}/upload-picture`,{method:'POST',body:fd});
    const ud=await ur.json();
    if(!ur.ok)throw new Error(ud.detail||'Photo upload failed');
    btn.textContent='Creating account...';
    const r=await fetch(`${API}/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,tricon_id,email,password,picture:ud.url})});
    const d=await r.json();
    if(!r.ok){const msg=Array.isArray(d.detail)?d.detail[0].msg.replace('Value error, ',''):d.detail||'Registration failed';throw new Error(msg);}
    showOk('✅ Account created! Pending HR approval. Redirecting to login...');
    setTimeout(()=>window.location.href='/login',5500);
  }catch(e){showErr(e.message);btn.textContent='Create Account';btn.disabled=false;}
}
</script>
</body>
</html>
