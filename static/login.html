<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TriconStories</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fdf4ee;--bg2:#ffffff;--bg3:#f5e6da;--border:#e2cfc2;
    --brown:#7c4a2d;--brown2:#5c3520;--brownlt:#a0674a;
    --rose:#e8c4b0;--rosebg:#f7e4d8;
    --text:#2c1a10;--sub:#6b4535;--muted:#b09080;
    --red:#b83225;--green:#3d7035;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 52px;height:64px;border-bottom:1px solid var(--border);background:rgba(253,244,238,.97);}
  .logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:var(--brown2);text-decoration:none;}
  .logo span{color:var(--brownlt);font-style:italic;}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 8px 36px rgba(90,45,15,.12);animation:up .35s ease;}
  @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .card-top{height:3px;background:linear-gradient(90deg,var(--brown2),var(--brownlt));}
  .card-body{padding:36px 36px 40px;}
  .card-icon{width:52px;height:52px;border-radius:12px;background:var(--rosebg);border:1px solid var(--rose);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:20px;}
  h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-.01em;}
  .sub{font-size:13px;color:var(--muted);font-weight:300;margin-bottom:28px;}

  .f{margin-bottom:16px;}
  .f label{display:block;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
  .f input{width:100%;height:46px;border:1.5px solid var(--border);border-radius:8px;background:white;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:0 14px;outline:none;transition:border-color .18s,box-shadow .18s;}
  .f input:focus{border-color:var(--brown);box-shadow:0 0 0 3px rgba(124,74,45,.10);}
  .f input::placeholder{color:var(--muted);}
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:44px;}
  .eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px;transition:color .18s;}
  .eye:hover{color:var(--brown);}

  .al{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;line-height:1.5;}
  .al.on{display:block;}
  .ae{background:rgba(184,50,37,.06);border:1px solid rgba(184,50,37,.2);color:var(--red);}

  .btn-full{width:100%;height:48px;border-radius:8px;background:var(--brown);color:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;letter-spacing:.01em;}
  .btn-full:hover:not(:disabled){background:var(--brown2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(92,53,32,.28);}
  .btn-full:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .sep{display:flex;align-items:center;gap:12px;margin:18px 0;}
  .sep hr{flex:1;border:none;border-top:1px solid var(--border);}
  .sep span{font-size:11px;color:var(--muted);}

  .btn-ghost{width:100%;height:42px;border-radius:8px;background:var(--rosebg);border:1px solid var(--rose);color:var(--brown);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;}
  .btn-ghost:hover{background:var(--bg3);border-color:var(--brownlt);}

  .footer{text-align:center;font-size:13px;color:var(--muted);margin-top:22px;}
  .footer a{color:var(--brown);text-decoration:none;font-weight:500;}
  .footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<nav>
  <a class="logo" href="/feed">Tricon<span>Stories</span></a>
</nav>
<main>
  <div>
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="card-icon">🔑</div>
        <h1>Welcome back</h1>
        <p class="sub">Sign in to your TriconStories account</p>

        <div class="al ae" id="err"></div>

        <div class="f">
          <label>Email Address</label>
          <input type="email" id="em" placeholder="you@tricon.com" onkeydown="kd(event)" />
        </div>
        <div class="f">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="pw" placeholder="Enter your password" onkeydown="kd(event)" />
            <button class="eye" type="button" onclick="tog()">👁</button>
          </div>
        </div>

        <button class="btn-full" id="lbtn" onclick="doLogin()">Sign In</button>


      </div>
    </div>
    <div class="footer">Don't have an account? <a href="/register">Register</a> &nbsp;·&nbsp; <a href="/feed">← Back to stories</a></div>
  </div>
</main>

<script>
const API="";
const existingToken=localStorage.getItem('token');
if(existingToken){try{const payload=JSON.parse(atob(existingToken.split('.')[1]));if(payload.exp*1000>Date.now())window.location.href='/dashboard';}catch(e){}}
function tog(){const i=document.getElementById('pw');i.type=i.type==='password'?'text':'password';}
function kd(e){if(e.key==='Enter')doLogin();}

function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('on');}
function hideErr(){document.getElementById('err').classList.remove('on');}

async function doLogin(){
  hideErr();
  const email=document.getElementById('em').value.trim();
  const password=document.getElementById('pw').value;
  if(!email)return showErr('Please enter your email address.');
  if(!email.toLowerCase().endsWith('@triconinfotech.com'))return showErr('Email must be a @triconinfotech.com address.');
  if(!password)return showErr('Please enter your password.');
  const btn=document.getElementById('lbtn');
  btn.textContent='Signing in...';btn.disabled=true;
  try{
    const r=await fetch(`${API}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.detail||'Invalid email or password.');
    localStorage.setItem('token',d.access_token);
    window.location.href='/dashboard';
  }catch(e){showErr(e.message);btn.textContent='Sign In';btn.disabled=false;}
}
</script>
</body>
</html>
