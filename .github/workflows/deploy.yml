name: Build and Deploy TriconStories

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: tejas10deshpande/triconstories:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull tejas10deshpande/triconstories:latest
            docker stop triconstories-app || true
            docker rm triconstories-app || true
            docker run -d \
              --name triconstories-app \
              --env-file /home/ubuntu/fastapi_project/.env \
              --restart always \
              -p 8000:8000 \
              tejas10deshpande/triconstories:latest
            docker system prune -f